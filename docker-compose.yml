services:
  app:
    build: .
    container_name: node_app
    environment:
      - NODE_ENV=docker
      - MONGO_URL=mongodb://mongodb:27017/nodeapp
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    volumes:
      - .:/home/app/node_docker
      - /home/app/node_docker/node_modules
    tty: true
    command: npm run dev

  mongodb:
    image: mongo:4.4
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
